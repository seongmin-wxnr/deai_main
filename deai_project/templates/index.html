<!DOCTYPE html>
<html lang="ko">
{% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/common.css' %}">
  <link rel="stylesheet" href="{% static 'css/index.css' %}">

  <title>Welcome Deai</title>
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 배경 Orb -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Nav -->
  <nav>
    
    <button class="nav-link" onclick="navigateTo('/login/')">로그인 →</button>
    <button class="nav-link" onclick="navigateTo('/register/')">회원가입 →</button>
    <button class="nav-link" onclick="navigateTo('/aboutDeai/')">Deai ? →</button>
    <button class="nav-link" onclick="navigateTo('login.html')">만든 사람 →</button>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main>
    <p class="eyebrow">어서오세요.</p>
    <h1 class="headline">Deai</h1>
    <p class="subtext">
      혼자 게임하기 외로운 당신에게<br>당신의 만남이 시작되는 곳.
    </p>
    <div class="cta-group">
      <button class="btn btn-primary" onclick="navigateTo('login/')">로그인 하기</button>
      <a href="#" class="btn btn-secondary">더 알아보기</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-bar">
    <a href="#" class="footer-link">개인정보 처리방침</a>
    <a href="#" class="footer-link">이용약관</a>
    <a href="#" class="footer-link">© 2025</a>
  </footer>

  <script>
    function navigateTo(url) {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = url; }, 400);
    }
  </script>

</body>
</html>
